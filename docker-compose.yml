services:
  postgres:
    container_name: multi-tenant-assignment
    image: postgres:latest
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    container_name: bullmq-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"

  api:
    build: .
    container_name: assignment-api
    env_file:
      - .env
    ports:
      - "${API_PUBLISH_PORT:-3005}:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: ["node", "dist/src/modules/worker/worker.js"]
    container_name: assignment-worker
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
